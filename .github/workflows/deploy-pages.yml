name: Deploy to GitHub Pages
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Source (centralized-docs-system)
        uses: actions/checkout@v4
        with:
          repository: romielmellizacomputo/centralized-docs-system
          token: ${{ secrets.PAT_TOKEN }}
          path: source

      - name: Checkout cds-engine
        uses: actions/checkout@v4
        with:
          path: target

      - name: Copy web files from private repo
        run: |
          cp source/src/index.html target/index.html
          cp source/src/app.js target/app.js
          cp source/src/style.css target/style.css

      - name: Commit and push to cds-engine
        run: |
          cd target
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Deploy latest from centralized-docs-system" || echo "No changes to commit"
          git push
