name: Fetch GitLab MR Service
on:
  schedule:
  - cron: '0 14 * * *'  # Runs every day at 10PM Philippine Time (UTC+8 = 14:00 UTC)
  workflow_dispatch:
jobs:
  run-github:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      PROJECT_CONFIG: ${{ secrets.PROJECT_CONFIG }}  # ✅ Set globally for the job
    steps:
      - name: Checkout Private Repo (centralized-docs-system)
        uses: actions/checkout@v4
        with:
          repository: romielmellizacomputo/centralized-docs-system
          token: ${{ secrets.PAT_TOKEN }}
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # ✅ upgraded from 14
      - name: Install dependencies
        run: |
          cd SheetSync
          npm install
      - name: Ensure package.json has type module
        run: |
          node -e "
            const fs = require('fs');
            const pkgPath = 'package.json';
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            if (pkg.type !== 'module') {
              pkg.type = 'module';
              fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2));
              console.log('✅ Added type: module to package.json');
            } else {
              console.log('ℹ️ package.json already has type: module');
            }
          "
      - name: Run fetchallmr.js
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          SHEET_SYNC_SID: ${{ secrets.SHEET_SYNC_SID }}
          SHEET_SYNC_SAJ: ${{ secrets.SHEET_SYNC_SAJ }}
          GITLAB_URL: ${{ secrets.GITLAB_URL }}
          PROJECT_CONFIG: ${{ secrets.PROJECT_CONFIG }}  # ✅ Explicitly pass this too
        run: |
          cd SheetSync
          node fetchallmr.js
