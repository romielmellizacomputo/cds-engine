name: Fetch Additional Issue Info
on:
  schedule:
    - cron: '0 16 * * *'  # 12:00 midnight Philippine Time (PHT)
    - cron: '0 4 * * *'   # 12:00 noon Philippine Time (PHT)
    - cron: '0 10 * * *'  # 6:00 PM Philippine Time (PHT)
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      PROJECT_CONFIG: ${{ secrets.PROJECT_CONFIG }}
    steps:
      - name: Checkout Private Repo (centralized-docs-system)
        uses: actions/checkout@v4
        with:
          repository: romielmellizacomputo/centralized-docs-system
          token: ${{ secrets.PAT_TOKEN }}
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install dotenv googleapis axios --legacy-peer-deps
      - name: Run additional issue data script
        env:
          GITLAB_URL: ${{ secrets.GITLAB_URL }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          SHEET_SYNC_SID: ${{ secrets.SHEET_SYNC_SID }}
          SHEET_SYNC_SAJ: ${{ secrets.SHEET_SYNC_SAJ }}
          PROJECT_CONFIG: ${{ secrets.PROJECT_CONFIG }}
        run: |
          node SheetSync/additional-issue-data.js
